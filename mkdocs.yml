site_name: zij
site_description: A canon of deep learning optimization algorithms.
site_url: https://junaidaliop.github.io/zij/
repo_url: https://github.com/junaidaliop/zij
repo_name: junaidaliop/zij
copyright: Apache-2.0 · Muhammad Junaid Ali Asif Raja
docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font:
    text: Roboto
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - assets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      hide_protocol: false
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Canon:
    - First-order: first-order.md
    - Memory-efficient: memory-efficient.md
    - Fractional-order: fractional.md
    - Distributed: distributed.md
    - Second-order: second-order.md
    - Zeroth-order: zeroth-order.md
    - Privacy-preserving: privacy-preserving.md
    - Sharpness-aware: sharpness-aware.md
    - Quantum: quantum.md
    - Learning-rate-free: lr-free.md
    - Schedulers: schedulers.md

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn
